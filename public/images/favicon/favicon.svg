<!--
  Pozdnyakov Composition Studio favicon.
  Inkwell-dark disc, vermilion stroke, vermilion АП on top. Hard-coded
  colours (favicons render outside the page context, so CSS tokens are
  not available). Inkwell matches inkwell-900 in the active theme;
  vermilion matches vermilion-500.
  TODO (alex): replace with a properly designed mark before launch.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="3 3 94 94">
  <circle
    cx="50"
    cy="50"
    r="46"
    fill="oklch(0.16 0.008 60)"
    stroke="oklch(0.58 0.175 30)"
    stroke-width="2.5"
  />
  <text
    x="50"
    y="52"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Newsreader', 'EB Garamond', Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    fill="oklch(0.58 0.175 30)"
  >АП</text>
</svg>
